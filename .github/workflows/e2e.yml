name: E2E

on:
  push:
    branches:
      - '**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      # Boots WordPress, installs the Loopress plugin and CLI, and captures the clean DB snapshot
      # that loopress/setup-ci/restore resets to between the groups of tests below.
      - uses: loopress/setup-ci@main

      - name: Happy path tests
        run: npx playwright test tests/e2e/happy-path.spec.ts

      - uses: loopress/setup-ci/restore@main

      - name: Conflict tests
        run: npx playwright test tests/e2e/conflicts.spec.ts

      - uses: loopress/setup-ci/restore@main

      - name: Error tests
        run: npx playwright test tests/e2e/errors.spec.ts
